services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=4000
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev -- --host

  bot:
    build: ./bot
    env_file: ./bot/.env
    environment:
      - BACKEND_URL=http://backend:4000
    volumes:
      - ./bot:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: node src/bot.js
    restart: unless-stopped
