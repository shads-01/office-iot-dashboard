version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host

  bot:
    build: ./bot
    env_file: ./bot/.env
    volumes:
      - ./bot:/app
    command: node src/bot.js
