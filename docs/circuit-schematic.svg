<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <style>text{font-family:Inter, Arial, sans-serif; font-size:13px}</style>
  <rect x="10" y="10" width="980" height="580" rx="6" fill="#fff" stroke="#eee"/>

  <text x="40" y="50" font-weight="700">Representative Wokwi Circuit (Work Room example)</text>
  <text x="40" y="80">ESP32 ↔ relays (5x) ↔ devices (2 motors + 3 LEDs). One current sensor on branch.</text>

  <rect x="60" y="110" width="220" height="140" rx="6" fill="#f7f7ff" stroke="#d0d0ff"/>
  <text x="80" y="145" font-weight="600">ESP32</text>
  <text x="80" y="170">GPIOs: 13,12,14,27,26 (relays)</text>
  <text x="80" y="190">Inputs: 32,33,25,4,5 (manual switches)</text>

  <rect x="320" y="110" width="560" height="140" rx="6" fill="#fff7f7" stroke="#ffd0d0"/>
  <text x="340" y="145" font-weight="600">Relay Modules &amp; Devices</text>
  <text x="340" y="170">Relay 1 → Fan motor A</text>
  <text x="340" y="190">Relay 2 → Fan motor B</text>
  <text x="520" y="170">Relay 3 → LED Light 1</text>
  <text x="520" y="190">Relay 4 → LED Light 2</text>
  <text x="720" y="170">Relay 5 → LED Light 3</text>

  <line x1="280" y1="170" x2="320" y2="170" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="40" y="300" font-weight="700">Notes</text>
  <text x="40" y="325">- Use relay modules between ESP32 GPIO and device mains line (GPIO drives relay coil).</text>
  <text x="40" y="345">- Manual wall switches wired to ESP32 inputs using pull-downs to detect human overrides.</text>
  <text x="40" y="365">- Place ACS712/INA219 sensor on one device branch to sample current (analog/I2C).</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444" />
    </marker>
  </defs>
</svg>
